name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Sync
        run: uv sync --all-groups
      - name: Ruff
        run: uv run ruff check src tests && uv run ruff format --check src tests
      - name: Pytest
        run: uv run pytest
